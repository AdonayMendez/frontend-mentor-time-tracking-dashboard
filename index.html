<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>

    <title>Frontend Mentor | Time tracking dashboard</title>
  </head>
  <body>
    <main>
      <div class="report">
        <div class="user-report">
          <div class="user-img">
            <img src="images/image-jeremy.png">
          </div>
          <div class="user-info">
            <p>Report for</p>
            <h2>Jeremy Robson</h2>
          </div>

        </div>
        <div class="timeframes-container">
          <button id="daily" class="active">Daily</button>
          <button id="weekly" class="active">Weekly</button>
          <button id="monthly" class="active">Monthly</button>
        </div>
      </div>
      <div class="data">
        <div class="data__img">
          <img src="images/icon-work.svg">
        </div>
        <div class="data-info">
          <div class="type-info">
          <h3></h3>
          <div class="menu">
            <ul>
              <li></li>
              <li></li>
              <li></li>

            </ul>
          </div>
          </div>
          <div class="time-info">
          <p class="current"></p>
          <p class="previous"></p>
          </div>
        </div>
      </div>
      <div class="data" style="background-color: var(--blue300);">
        <div class="data__img" style="background-color: var(--blue300);">
          <img src="images/icon-play.svg">
        </div>
        <div class="data-info">
          <div class="type-info">
          <h3></h3>
          <div class="menu">
            <ul>
              <li></li>
              <li></li>
              <li></li>
            </ul>
          </div>
          </div>
          <div class="time-info">
          <p class="current"></p>
          <p class="previous"></p>
          </div>
        </div>
      </div>
      <div class="data" style="background-color: var(--pink400);">
        <div class="data__img" style="background-color: var(--pink400);">
          <img src="images/icon-study.svg">
        </div>
        <div class="data-info">
          <div class="type-info">
          <h3></h3>
          <div class="menu">
                 <ul>
              <li></li>
              <li></li>
              <li></li>
            </ul>
          </div>
          </div>
          <div class="time-info">
          <p class="current"></p>
          <p class="previous"></p>
          </div>
        </div>
      </div>
      <div class="data" style="background-color: var(--green400);">
        <div class="data__img" style="background-color: var(--green400);">
          <img src="images/icon-exercise.svg">
        </div>
        <div class="data-info">
          <div class="type-info">
          <h3></h3>
          <div class="menu">
            <ul>
              <li></li>
              <li></li>
              <li></li>
            </ul>
          </div>
          </div>
          <div class="time-info">
          <p class="current"></p>
          <p class="previous"></p>
          </div>
        </div>
      </div>
      <div class="data" style="background-color: var(--purple700);">
        <div class="data__img" style="background-color: var(--purple700);">
          <img src="images/icon-social.svg">
        </div>
        <div class="data-info">
          <div class="type-info">
          <h3></h3>
          <div class="menu">
                 <ul>
              <li></li>
              <li></li>
              <li></li>
            </ul>
          </div>
          </div>
          <div class="time-info">
          <p class="current"></p>
          <p class="previous"></p>
          </div>
        </div>
      </div>
      <div class="data" style="background-color: var(--yellow);">
        <div class="data__img" style="background-color: var(--yellow);">
          <img src="images/icon-self-care.svg">
        </div>
        <div class="data-info">
          <div class="type-info">
          <h3></h3>
          <div class="menu">
                 <ul>
              <li></li>
              <li></li>
              <li></li>
            </ul>
          </div>
          </div>
          <div class="time-info">
          <p class="current"></p>
          <p class="previous"></p>
          </div>
        </div>
      </div>

    </main>
  </body>
</html>
